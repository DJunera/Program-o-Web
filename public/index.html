<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gerenciador de Salários</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .lista-box {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px 0;
            min-height: 50px;
            background: #f9f9f9;
        }

        .item-salario {
            display: inline-block;
            background: #e0e0e0;
            padding: 5px 10px;
            margin: 5px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <h1>Calculadora de Salários</h1>

    <!-- Campo para adicionar um salário por vez -->
    <label for="inputSalario">Digite um salário:</label>
    <input type="number" id="inputSalario" step="0.01" placeholder="Ex: 1500.00">
    <button type="button" onclick="adicionarSalario()">Guardar Salário</button>

    <h3>Salários na lista:</h3>
    <div id="displayLista" class="lista-box">A lista está vazia</div>

    <!-- Formulário invisível que enviará os dados acumulados -->
    <form action="/analisar" method="GET">
        <input type="hidden" id="campoFinal" name="salarios">
        <button type="submit" id="btnCalcular" disabled>Calcular Maior Salário</button>
    </form>

    <script>
        let listaDeSalarios = [];

        function adicionarSalario() {
            const input = document.getElementById('inputSalario');
            const valor = parseFloat(input.value);

            if (!isNaN(valor) && valor > 0) {
                // Adiciona ao array
                listaDeSalarios.push(valor);

                // Atualiza a visualização na tela
                atualizarInterface();

                // Limpa o campo e foca nele de novo
                input.value = '';
                input.focus();
            } else {
                alert("Por favor, digite um valor válido.");
            }
        }

        function atualizarInterface() {
            const display = document.getElementById('displayLista');
            const campoFinal = document.getElementById('campoFinal');
            const btnCalcular = document.getElementById('btnCalcular');

            // Mostra os valores para o usuário
            display.innerHTML = listaDeSalarios
                .map(s => `<span class="item-salario">R$ ${s.toFixed(2)}</span>`)
                .join('');

            // Coloca os valores no input escondido do formulário (separados por vírgula)
            campoFinal.value = listaDeSalarios.join(',');

            // Ativa o botão de calcular se houver itens
            btnCalcular.disabled = listaDeSalarios.length === 0;
        }
    </script>
</body>

</html>
